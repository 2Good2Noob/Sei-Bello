name: Update Booksy price list (daily)

on:
  schedule:
    # Uruchamia się codziennie o 5:15 rano
    - cron: "15 05 * * *"
  workflow_dispatch: # Pozwala na ręczne uruchomienie przyciskiem

permissions:
  contents: write # Wymagane, aby GitHub Actions mogło zapisać zmiany w pliku

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Instalujemy curl_cffi, aby udawać prawdziwą przeglądarkę
          pip install curl_cffi

      - name: Generate JSON from Booksy API
        run: python scripts/update_booksy_prices.py

      - name: Commit & push if changed
        run: |
          # Konfiguracja bota GitHuba
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Dodanie pliku do poczekalni (staging area)
          git add data/booksy-prices.json
          
          # Sprawdzenie, czy zawartość pliku różni się od tego w repozytorium
          if git diff --staged --quiet; then
            echo "Brak zmian w cenach na Booksy. Pomijam aktualizację."
          else
            echo "Wykryto zmiany. Wysyłam aktualizację do repozytorium."
            git commit -m "chore: auto-update Booksy price list"
            git push
          fi
