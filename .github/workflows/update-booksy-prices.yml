name: Update Booksy price list (daily)

on:
  schedule:
    # Uruchamia się codziennie o 5:15 rano czasu polskiego
    - cron: "15 05 * * *"
  workflow_dispatch: # Pozwala na ręczne uruchomienie (przycisk Run workflow)

permissions:
  contents: write # Wymagane uprawnienie, aby móc zapisać zaktualizowany plik

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Używamy standardowych bibliotek do scrapowania strony HTML
          pip install requests beautifulsoup4

      - name: Generate JSON from Booksy HTML
        run: python scripts/update_booksy_prices.py

      - name: Commit & push if changed
        run: |
          # Konfiguracja tożsamości bota
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Dodanie pliku do stagingu (poczekalni)
          git add data/booksy-prices.json
          
          # Jeśli nic się nie zmieniło w poczekalni w stosunku do repozytorium
          if git diff --staged --quiet; then
            echo "Brak zmian w cenach na Booksy. Pomijam aktualizację."
          else
            echo "Wykryto zmiany. Wysyłam aktualizację do repozytorium."
            git commit -m "chore: auto-update Booksy price list"
            git push
          fi
